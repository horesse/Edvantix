edition = "2023";

option csharp_namespace = "Edvantix.OrganizationManagement.Grpc.Services";

package usage.v1;

service UsageGrpcService {
  rpc UpdateUsageValue(UpdateUsageRequest) returns (UsageResponse);
}

message UpdateUsageRequest {
  int64 organization_id = 1;
  int64 limit_id = 2;
  double value = 3;
}

message UsageResponse {
  int64 id = 1;
  int64 organization_id = 2;
  int64 limit_id = 3;
  double value = 4;
}

