edition = "2023";

option csharp_namespace = "Edvantix.Notification.Grpc.Services";

package notifications.v1;

// gRPC-сервис внутриприложенческих уведомлений.
// Используется другими микросервисами для создания in-app уведомлений конкретным пользователям.
service InAppNotificationGrpcService {
  rpc SendInAppNotification(SendInAppNotificationRequest) returns (SendInAppNotificationResponse);
}

// Запрос на создание уведомления. account_id — Keycloak UUID получателя.
message SendInAppNotificationRequest {
  string account_id = 1;

  // Тип уведомления: 0=Info, 1=Success, 2=Warning, 3=Error, 4=Invitation, 5=Achievement, 6=System
  int32 type = 2;

  string title = 3;
  string message = 4;

  // Опциональные метаданные в формате JSON (ссылки, идентификаторы связанных сущностей)
  optional string metadata = 5;
}

message SendInAppNotificationResponse {
  string notification_id = 1;
}
