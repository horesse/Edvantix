edition = "2023";

option csharp_namespace = "Edvantix.Persona.Grpc.Services";

package profile.v1;

// Сервис профилей — используется другими микросервисами для получения данных пользователей.
service ProfileGrpcService {
  rpc GetProfile (GetProfileRequest) returns (ProfileReply);
}

message GetProfileRequest {
  oneof identifier {
    string profile_id = 1;
    string account_id = 2;
  }
}

message ProfileReply {
  string id = 1;
  string account_id = 2;
  int32 gender = 3;
  string birth_date = 4;
  string full_name = 5;
  string first_name = 6;
  string last_name = 7;
  string middle_name = 8;
  string login = 9;
}
