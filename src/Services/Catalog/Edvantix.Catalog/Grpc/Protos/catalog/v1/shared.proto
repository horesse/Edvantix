edition = "2023";

option csharp_namespace = "Edvantix.Catalog.Grpc.Services";

package catalog.v1;

// Общие сообщения запросов, используемые во всех RPC-методах каталога.

message GetByCodeRequest {
  string code = 1;
}

message ListRequest {
  bool active_only = 1;
}

message DecimalValue {
  int64 units = 1;
  sfixed32 nanos = 2;
}
