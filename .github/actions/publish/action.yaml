name: "Publish Artifact"
description: "Publish the artifact to GitHub Container Registry"

inputs:
  global-json-file:
    description: "The path to the global.json file"
    required: false
    default: "./global.json"
  bun-version-file:
    description: "The path to the .bun-version file"
    required: false
    default: ".bun-version"
  repository:
    description: "The owner of the repository"
    required: false
  operations-environment:
    description: "The operations environment to use for Aspire commands"
    required: false
    default: ${{ runner.os }}
  azure-subscription-id:
    description: "Azure Subscription ID for authentication"
    required: true
  azure-location:
    description: "Azure Location for deployment"
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: ${{ inputs.global-json-file }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Install Aspire CLI
      shell: bash
      run: |
        curl -sSL https://aspire.dev/install.sh | bash
        echo "$HOME/.aspire/bin" >> $GITHUB_PATH

    - name: Verify Aspire Installation
      shell: bash
      run: aspire --version

    - name: Push to GitHub Container Registry
      shell: bash
      run: aspire do push
      env:
        Azure__SubscriptionId: ${{ inputs.azure-subscription-id }}
        Azure__Location: ${{ inputs.azure-location }}
        Parameters__container_endpoint: ghcr.io
        Parameters__container_repository: ${{ inputs.repository }}