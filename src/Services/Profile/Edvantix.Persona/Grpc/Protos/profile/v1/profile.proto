edition = "2023";

option csharp_namespace = "Edvantix.ProfileService.Grpc.Services";

package profile.v1;

service ProfileGrpcService {
  rpc GetProfileByAccountId (GetProfileByAccountIdRequest) returns (ProfileReply);
  rpc GetProfileById (GetProfileByIdRequest) returns (ProfileReply);
}

message GetProfileByAccountIdRequest {
  string account_id = 1;
}

message GetProfileByIdRequest {
  int64 profile_id = 1;
}

message ProfileReply {
  int64 id = 1;
  string account_id = 2;
  int32 gender = 3;
  string birth_date = 4;
  string full_name = 5;
  string first_name = 6;
  string last_name = 7;
  string middle_name = 8;
}
