edition = "2023";

option csharp_namespace = "Edvantix.Catalog.Grpc.Services";

package catalog.v1;

import "catalog/v1/shared.proto";

// Сервис и сообщения для часовых поясов (IANA TZ Database).

service TimezoneService {
  rpc GetTimezone(GetByCodeRequest) returns (TimezoneResponse);
  rpc ListTimezones(ListRequest) returns (TimezonesResponse);
}

message TimezoneResponse {
  string code = 1;
  string name_ru = 2;
  string name_en = 3;
  string display_name = 4;
  int32 utc_offset_minutes = 5;
  bool is_active = 6;
}

message TimezonesResponse {
  repeated TimezoneResponse items = 1;
}
