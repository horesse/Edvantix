edition = "2023";

option csharp_namespace = "Edvantix.Persona.Grpc.Services";

package profile.v1;

service ProfileGrpcService {
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
  rpc GetProfiles (GetProfilesRequest) returns (GetProfilesResponse);
  rpc GetProfileByLogin (GetProfileByLoginRequest) returns (GetProfileByLoginResponse);
}

message GetProfileRequest {
  string profile_id = 1;
}

message GetProfileResponse {
  string id = 1;
  string full_name = 2;
  string first_name = 3;
  string last_name = 4;
  string middle_name = 5;
  string avatar_url = 6;
}

message GetProfilesRequest {
  repeated string profile_ids = 1;
}

message GetProfilesResponse {
  repeated GetProfileResponse profiles = 1;
}

message GetProfileByLoginRequest {
  string login = 1;
}

message GetProfileByLoginResponse {
  string profile_id = 1;
  string account_id = 2;
  string full_name = 3;
  string login = 4;
}
