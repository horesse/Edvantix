edition = "2023";

option csharp_namespace = "Edvantix.Organizations.Grpc.Generated";

package organizations.v1;

// CheckPermission — resolves whether a user holds a specific permission within a school.
// Used by downstream services to enforce RBAC without hitting their own DB.
service PermissionsGrpcService {
  rpc CheckPermission (CheckPermissionRequest) returns (CheckPermissionReply);
}

message CheckPermissionRequest {
  string user_id = 1;
  string school_id = 2;
  string permission = 3;
}

message CheckPermissionReply {
  bool has_permission = 1;
}
