edition = "2023";

option csharp_namespace = "Edvantix.Organizations.Grpc.Generated";

package organizations.v1;

// Groups service — resolves group membership and group details for downstream services.
// Used by Scheduling to get group memberships for a student (plan 03-05 student schedule view)
// and to validate group existence when creating lesson slots.
service GroupsGrpcService {
  // Returns the IDs of all groups a student belongs to in a given school.
  rpc GetGroupsForStudent (GetGroupsForStudentRequest) returns (GetGroupsForStudentReply);

  // Returns group details by ID. Found=false when the group does not exist or is deleted.
  rpc GetGroup (GetGroupRequest) returns (GetGroupReply);
}

message GetGroupsForStudentRequest {
  string school_id = 1;
  string profile_id = 2;
}

message GetGroupsForStudentReply {
  repeated string group_ids = 1;
}

message GetGroupRequest {
  string group_id = 1;
}

message GetGroupReply {
  string id = 1;
  string name = 2;
  string color = 3;
  int32 max_capacity = 4;
  bool found = 5;
}
