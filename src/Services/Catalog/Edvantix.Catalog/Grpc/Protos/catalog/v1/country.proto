edition = "2023";

option csharp_namespace = "Edvantix.Catalog.Grpc.Services";

package catalog.v1;

import "catalog/v1/shared.proto";

// Сервис и сообщения для стран (ISO 3166-1).

service CountryService {
  rpc GetCountry(GetByCodeRequest) returns (CountryResponse);
  rpc ListCountries(ListRequest) returns (CountriesResponse);
}

message CountryResponse {
  string code = 1;
  string alpha3_code = 2;
  int32 numeric_code = 3;
  string name_ru = 4;
  string name_en = 5;
  string phone_prefix = 6;
  string currency_code = 7;
  bool is_active = 8;
}

message CountriesResponse {
  repeated CountryResponse items = 1;
}
