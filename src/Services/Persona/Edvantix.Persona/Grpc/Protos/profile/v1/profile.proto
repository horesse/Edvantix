edition = "2023";

option csharp_namespace = "Edvantix.Persona.Grpc.Services";

package profile.v1;

service ProfileGrpcService {
  rpc GetProfile (GetProfileRequest) returns (ProfileResponse);
}

message GetProfileRequest {
  string profile_id = 1;
}

message ProfileResponse {
  string id = 1;
  string account_id = 2;
  int32 gender = 3;
  string birth_date = 4;
  string full_name = 5;
  string first_name = 6;
  string last_name = 7;
  string middle_name = 8;
  string login = 9;
}
