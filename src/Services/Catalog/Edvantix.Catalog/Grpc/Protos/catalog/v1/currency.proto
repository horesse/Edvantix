edition = "2023";

option csharp_namespace = "Edvantix.Catalog.Grpc.Services";

package catalog.v1;

import "catalog/v1/shared.proto";

// Сервис и сообщения для валют (ISO 4217).

service CurrencyService {
  rpc GetCurrency(GetByCodeRequest) returns (CurrencyResponse);
  rpc ListCurrencies(ListRequest) returns (CurrenciesResponse);
}

message CurrencyResponse {
  string code = 1;
  int32 numeric_code = 2;
  string name_ru = 3;
  string name_en = 4;
  string symbol = 5;
  int32 decimal_digits = 6;
  bool is_active = 7;
}

message CurrenciesResponse {
  repeated CurrencyResponse items = 1;
}
